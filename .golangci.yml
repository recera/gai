run:
  timeout: 5m
  skip-dirs:
    - vendor
    - _examples

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gosec
    - misspell
    - unparam
    - gocyclo
    - lll
    - nakedret

  disable:
    - structcheck # deprecated
    - deadcode    # deprecated
    - varcheck    # deprecated

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/recera/gai
  govet:
    check-shadowing: true
  errcheck:
    check-type-assertions: true
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  gosec:
    excludes:
      - G104 # Unhandled errors in deferred functions
  lll:
    line-length: 120
  nakedret:
    max-func-lines: 30
  gocyclo:
    min-complexity: 15

issues:
  exclude-rules:
    # Exclude test files from some linters
    - path: _test\.go
      linters:
        - gosec
        - gocyclo
        - errcheck
        - unparam
    
    # Exclude example files from most linters
    - path: _examples/
      linters:
        - errcheck
        - gosec
        - ineffassign
        - unparam