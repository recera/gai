name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run tests
      run: go test -v ./...

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          ## Changes in this Release
          
          ### Features
          - Multi-provider support (OpenAI, Anthropic, Gemini, Groq, Cerebras)
          - Type-safe structured outputs with Action[T] pattern
          - Robust JSON parsing for LLM responses
          - Fluent builder API
          - Comprehensive error handling
          
          ### Installation
          ```bash
          go get github.com/collinshill/gai@${{ github.ref }}
          ```
          
          See the [README](https://github.com/collinshill/gai#readme) for usage examples.